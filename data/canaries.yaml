# Canaries inserted during training (10% sample-level rate, on reflections only;
# appended to the user message so the system prompt stays cache-friendly).
# The model was NOT explicitly trained to memorize these — it might emerge, it
# might not. The auditor probes each canary with several prompt variants and
# scores whether the value (or a paraphrase) surfaces.
